syntax = "proto3";

package mini.containerd.v1;

option go_package = "github.com/tcherry/mini-container-ecosystem/mini-containerd/api/content;contentpb";

// Content service — manages OCI image blobs (Phase 2.1)
service Content {
    // Write uploads a blob and returns its digest.
    rpc Write(stream WriteRequest) returns (WriteResponse);
    // Read retrieves a blob by digest.
    rpc Read(ReadRequest) returns (stream ReadResponse);
    // Info returns metadata for a blob.
    rpc Info(InfoRequest) returns (InfoResponse);
    // Delete removes a blob from the store.
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    // List returns all known blobs.
    rpc List(ListRequest) returns (stream ListResponse);
    // Status returns the upload status of an in-progress write.
    rpc Status(StatusRequest) returns (StatusResponse);
}

message WriteRequest {
    bytes data = 1;
    int64 offset = 2;   // total offset, for resuming
    string ref = 3;      // optional reference name
}

message WriteResponse {
    string digest = 1;   // sha256:xxx
    int64 size = 2;
}

message ReadRequest {
    string digest = 1;
    int64 offset = 2;
}

message ReadResponse {
    bytes data = 1;
}

message InfoRequest {
    string digest = 1;
}

message InfoResponse {
    string digest = 1;
    int64 size = 2;
    int64 created_at = 3;
    int64 updated_at = 4;
}

message DeleteRequest {
    string digest = 1;
}

message DeleteResponse {}

message ListRequest {
    string filter = 1;  // optional prefix filter
}

message ListResponse {
    string digest = 1;
    int64 size = 2;
}

message StatusRequest {
    string ref = 1;
}

message StatusResponse {
    int64 offset = 1;
    int64 total = 2;      // 0 if unknown
    string status = 3;     // "uploading", "committed"
}
